<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense & Budget Visualizer</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <h1>Your Daily In and Out</h1>
      <button id="themeToggle" class="icon-btn" aria-label="Toggle dark mode">🌙</button>
    </header>

    <!-- Balance Card -->
    <section class="balance-card">
      <p class="balance-label">Total Balance</p>
      <h2 class="balance-amount" id="balanceAmount">$0.00</h2>
      <div class="balance-row">
        <div>
          <p class="sub-label">Income</p>
          <p class="income-total" id="incomeTotal">+$0.00</p>
        </div>
        <div>
          <p class="sub-label">Expenses</p>
          <p class="expense-total" id="expenseTotal">-$0.00</p>
        </div>
      </div>
    </section>

    <!-- Spending Limit Alert -->
    <div class="limit-alert hidden" id="limitAlert">
      ⚠️ You've exceeded your spending limit!
    </div>

    <!-- Chart -->
    <section class="card">
      <h3 class="section-title">Spending by Category</h3>
      <canvas id="categoryChart" height="220"></canvas>
      <div class="legend" id="chartLegend"></div>
    </section>

    <!-- Add Transaction -->
    <section class="card">
      <h3 class="section-title">Add Transaction</h3>
      <form id="transactionForm">
        <input type="text" id="txDesc" placeholder="Description" required />
        <input type="number" id="txAmount" placeholder="Amount (use - for expense)" step="1" required />
        <div class="form-row">
          <select id="txCategory">
            <option value="">Select category</option>
          </select>
          <button type="button" id="addCategoryBtn" class="secondary-btn">+ Category</button>
        </div>
        <input type="date" id="txDate" required />
        <button type="submit" class="primary-btn">Add Transaction</button>
      </form>
    </section>

    <!-- Spending Limit -->
    <section class="card">
      <h3 class="section-title">Spending Limit</h3>
      <div class="form-row">
        <input type="number" id="spendingLimit" placeholder="Set monthly limit (Rp)" step="1" />
        <button id="setLimitBtn" class="secondary-btn">Set</button>
      </div>
      <p class="limit-info" id="limitInfo"></p>
    </section>

    <!-- Transaction History -->
    <section class="card">
      <div class="section-header">
        <h3 class="section-title">Transactions</h3>
        <div class="sort-controls">
          <label for="sortSelect">Sort:</label>
          <select id="sortSelect">
            <option value="date-desc">Newest</option>
            <option value="date-asc">Oldest</option>
            <option value="amount-desc">Highest</option>
            <option value="amount-asc">Lowest</option>
            <option value="category">Category</option>
          </select>
        </div>
      </div>
      <ul class="tx-list" id="txList">
        <li class="empty-state">No transactions yet.</li>
      </ul>
    </section>

  </div>

  <!-- Add Category Modal -->
  <div class="modal-overlay hidden" id="categoryModal">
    <div class="modal">
      <h3>Add Custom Category</h3>
      <input type="text" id="newCategoryInput" placeholder="Category name" />
      <div class="modal-actions">
        <button id="saveCategoryBtn" class="primary-btn">Save</button>
        <button id="cancelCategoryBtn" class="secondary-btn">Cancel</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
